<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Ticket</title>
  <link rel="icon" href="images/favicon (1).ico" />
  <link rel="stylesheet" href="eventform.css" />
  <script src="eventform.js" defer></script>
</head>
<body>
  <main class="wrapper">
    <h1>Event Ticket</h1>

    <form id="eventForm">
      <div class="field">
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" type="text" />
      </div>

      <div class="field">
        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" type="text" />
      </div>

      <div class="field full">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" />
      </div>

      <div class="field">
        <label for="type">Type</label>
        <select id="type" name="type" aria-controls="credentialContainer">
          <option value="">Choose one</option>
          <option value="student">Student</option>
          <option value="guest">Guest</option>
        </select>
      </div>

      <div class="field">
        <label for="eventDate">Event Date</label>
        <input id="eventDate" name="eventDate" type="date" />
      </div>

      <!-- This div stays hidden until a Type is chosen -->
      <div id="credentialContainer" class="field full" hidden>
        <label id="credentialLabel" for="credential">Credential</label>
        <input id="credential" name="credential" type="text" />
      </div>

      <button class="full" type="submit">Create Ticket</button>
    </form>

    <!-- Errors and the finished ticket both show up here, below the form -->
    <section id="output" aria-live="polite"></section>
  </main>
</body>
</html>
