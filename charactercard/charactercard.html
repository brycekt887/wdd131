    <meta charset="UTF-8">

    <meta name="description" content="A JavaScript character card for Snortleblat, a Swamp Beast Diplomat. Attack and level up the character using object methods.">

    <meta property="og:title" content="Character Card - Snortleblat">

    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="charactercard.css">
    <script src="charactercard.js" defer></script>
</head>
<body>
    <main class="card">
        <img class="image" width="400" height="387" alt="Snortleblat">
        <h1 class="name" id="characterName"></h1>
        <div class="stats">
            <p><strong>Class:</strong> <span id="characterClass"></span></p>
            <p><strong>Level:</strong> <span id="characterLevel"></span></p>
            <p><strong>Health:</strong> <span id="characterHealth"></span></p>
        </div>
        <div class="buttons">
            <button id="attackedBtn" type="button">Attacked</button>
            <button id="levelUpBtn" type="button">Level Up</button>
        </div>
    </main>
</body>
</html>
