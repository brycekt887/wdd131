    <header>
      <div class="logo">
        <img src="images/recipe-book.png" alt="RecipeBook logo" />
        <h1>RecipeBook</h1>
      </div>
      <div class="search">
        <label for="search-input" class="visually-hidden">Find a recipe</label>
        <input

          id="search-input"
          name="search"
          placeholder="Find a recipe"
        />

    <main>

        <div class="media-card-content">

          <h2>Apple Crisp</h2>
          <span

            role="img"

            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>

          <p class="recipe-description">
            This apple crisp recipe is a simple yet delicious fall dessert
            that's great served warm with vanilla ice cream.
          </p>
