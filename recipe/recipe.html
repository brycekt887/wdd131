<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeBook</title>
    <meta
      name="description"
      content="Search a collection of simple, delicious recipes."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RecipeBook" />
    <meta
      property="og:description"
      content="Search a collection of simple, delicious recipes."
    />
    <meta property="og:url" content="https://YOUR-USERNAME.github.io/recipes/" />
    <meta property="og:image" content="images/social-preview.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RecipeBook" />
    <meta
      name="twitter:description"
      content="Search a collection of simple, delicious recipes."
    />
    <meta name="twitter:image" content="images/social-preview.png" />
    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="recipe.css" />
    <script defer src="recipe.js"></script>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="images/recipe-book.png" alt="RecipeBook logo" />
        <h1>RecipeBook</h1>
      </div>
      <div class="search">
        <label for="search-input" class="visually-hidden">Find a recipe</label>
        <input
          type="text"
          id="search-input"
          name="search"
          placeholder="Find a recipe"
        />
        <button type="submit" aria-label="Search">
          <img src="images/search.svg" alt="" />
        </button>
      </div>
    </header>

    <main id="recipe-container"></main>

    <footer>
      <a
        href="https://www.flaticon.com/free-icons/recipe"
        title="recipe icons"
        >Recipe icons created by Freepik - Flaticon</a
      >
      <div class="social">
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon" /></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon" /></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon" /></a>
      </div>
    </footer>
  </body>
</html>
